name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "homeassistant==2026.7.2" pytest pytest-asyncio pytest-cov ruff

      - name: Run Ruff lint
        run: ruff check custom_components tests

      - name: Run tests with coverage gate
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests -q \
            --cov=custom_components/dashboard_entity_checker \
            --cov-report=term-missing \
            --cov-fail-under=90